<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Speech Transcriber</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #f5f6fa;
    display: flex; justify-content: center; align-items: center;
    min-height: 100dvh; padding: 20px;
  }
  .card {
    background: white; border-radius: 16px; width: 100%; max-width: 520px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 24px rgba(0,0,0,.04);
    overflow: hidden;
  }
  .card-header {
    background: #1a1a2e; padding: 28px 32px 24px;
  }
  .card-header h1 {
    color: white; font-size: 1.25rem; font-weight: 700; letter-spacing: -.3px;
  }
  .card-header p {
    color: rgba(255,255,255,.55); font-size: .85rem; margin-top: 4px;
  }
  .card-body { padding: 28px 32px 32px; }
  .btn-row { display: flex; gap: 12px; margin-bottom: 20px; }
  .btn-row button {
    flex: 1; padding: 13px; border: none; border-radius: 10px;
    font-size: .95rem; font-weight: 600; cursor: pointer;
    transition: all .15s; -webkit-tap-highlight-color: transparent;
  }
  .btn-row button:active { transform: scale(.97); }
  #recordBtn {
    background: #e53935; color: white; box-shadow: 0 2px 8px rgba(229,57,53,.25);
  }
  #recordBtn:hover { background: #d32f2f; }
  #recordBtn.recording { background: #b71c1c; animation: pulse 1.4s infinite; }
  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: .65; } 100% { opacity: 1; } }
  #transcribeBtn { background: #1a1a2e; color: white; }
  #transcribeBtn:hover { background: #2d2d4a; }
  #transcribeBtn:disabled { background: #e0e0e0; color: #aaa; cursor: default; box-shadow: none; }
  .status-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
    font-size: .82rem; color: #888;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    background: #ccc; transition: background .3s;
  }
  .status-dot.idle { background: #ccc; }
  .status-dot.recording { background: #e53935; animation: pulse 1.4s infinite; }
  .status-dot.done { background: #43a047; }
  .status-dot.error { background: #e53935; }
  .status-dot.complete { background: #43a047; }
  textarea {
    width: 100%; height: 220px; padding: 14px; border: 1px solid #e8e8e8;
    border-radius: 10px; font-size: .9rem; line-height: 1.6;
    resize: vertical; outline: none; background: #fafafa;
    font-family: inherit; color: #222; transition: border .2s;
  }
  textarea:focus { border-color: #1a1a2e; background: #fff; }
  textarea::placeholder { color: #bbb; }
  .footer-row { display: flex; gap: 10px; margin-top: 12px; min-height: 42px; }
  .footer-row button {
    flex: 1; padding: 10px; border: none; border-radius: 8px;
    font-size: .85rem; font-weight: 600; cursor: pointer; transition: all .15s;
  }
  .footer-row button:active { transform: scale(.97); }
  #saveBtn {
    display: none; background: #43a047; color: white;
  }
  #saveBtn:hover { background: #388e3c; }
  #clearBtn {
    display: none; background: #f5f5f5; color: #666;
  }
  #clearBtn:hover { background: #eee; }
  .error {
    font-size: .8rem; color: #e53935; margin-top: 12px; min-height: 1.2em;
  }
  @media (max-width: 480px) {
    .card-header { padding: 22px 20px 18px; }
    .card-body { padding: 22px 20px 24px; }
    .card-header h1 { font-size: 1.1rem; }
    .btn-row button { padding: 12px; font-size: .9rem; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <h1>Speech Transcriber</h1>
    <p>Raw transcription — every "um", "uh", and pause preserved</p>
  </div>
  <div class="card-body">
    <div class="btn-row">
      <button id="recordBtn">Record</button>
      <button id="transcribeBtn" disabled>Transcribe</button>
    </div>

    <div class="status-row">
      <span class="status-dot idle" id="statusDot"></span>
      <span id="status">Press Record and start speaking</span>
    </div>

    <textarea id="result" placeholder="Transcription will appear here as you speak..." readonly></textarea>

    <div class="footer-row">
      <button id="saveBtn">Copy to clipboard</button>
      <button id="clearBtn">Clear</button>
    </div>
    <div id="error" class="error"></div>
  </div>
</div>

<script>
const recordBtn = document.getElementById('recordBtn');
const transcribeBtn = document.getElementById('transcribeBtn');
const resultArea = document.getElementById('result');
const statusEl = document.getElementById('status');
const statusDot = document.getElementById('statusDot');
const errorEl = document.getElementById('error');
const saveBtn = document.getElementById('saveBtn');
const clearBtn = document.getElementById('clearBtn');

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SR) {
  statusEl.textContent = 'Unsupported browser. Use Chrome or Edge.';
  statusDot.className = 'status-dot error';
  recordBtn.disabled = true;
  transcribeBtn.disabled = true;
}

let isRecording = false;
let recognition = null;
let transcript = '';

recordBtn.addEventListener('click', () => {
  if (!isRecording) startRecording();
  else stopRecording();
});

transcribeBtn.addEventListener('click', () => {
  resultArea.value = transcript;
  saveBtn.style.display = 'block';
  clearBtn.style.display = 'block';
  transcribeBtn.disabled = true;
  statusEl.textContent = 'Transcription complete';
  statusDot.className = 'status-dot complete';
});

saveBtn.addEventListener('click', () => {
  navigator.clipboard.writeText(resultArea.value).then(() => {
    saveBtn.textContent = 'Copied!';
    setTimeout(() => { saveBtn.textContent = 'Copy to clipboard'; }, 2000);
  });
});

clearBtn.addEventListener('click', () => {
  transcript = '';
  resultArea.value = '';
  saveBtn.style.display = 'none';
  clearBtn.style.display = 'none';
  statusEl.textContent = 'Cleared. Press Record to start.';
  statusDot.className = 'status-dot idle';
});

function setStatus(text, dotClass) {
  statusEl.textContent = text;
  statusDot.className = 'status-dot ' + dotClass;
}

function startRecording() {
  transcript = '';
  resultArea.value = '';
  errorEl.textContent = '';
  saveBtn.style.display = 'none';
  clearBtn.style.display = 'none';
  transcribeBtn.disabled = true;

  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const r = event.results[i];
      if (r.isFinal) transcript += r[0].transcript + ' ';
      else interim += r[0].transcript;
    }
    resultArea.value = transcript + interim;
  };

  recognition.onerror = (e) => {
    if (e.error === 'not-allowed') {
      errorEl.textContent = 'Microphone access blocked. Check your browser settings.';
      setStatus('Mic denied', 'error');
      stopRecording();
    }
  };

  recognition.onend = () => {
    if (isRecording) {
      try { recognition.start(); } catch (e) {}
    }
  };

  try {
    recognition.start();
    isRecording = true;
    recordBtn.textContent = 'Stop';
    recordBtn.classList.add('recording');
    setStatus('Recording... speak now', 'recording');
  } catch (e) {
    errorEl.textContent = 'Failed to start: ' + e.message;
  }
}

function stopRecording() {
  isRecording = false;
  recordBtn.textContent = 'Record';
  recordBtn.classList.remove('recording');

  if (recognition) {
    recognition.onend = null;
    try { recognition.stop(); } catch (e) {}
    recognition = null;
  }

  if (transcript.trim()) {
    resultArea.value = transcript;
    transcribeBtn.disabled = false;
    setStatus('Recording stopped. Tap Transcribe to confirm.', 'done');
  } else {
    setStatus('No speech detected. Try again.', 'idle');
  }
}
</script>
</body>
</html>
